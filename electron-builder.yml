appId: app.mermaid.localeditor
productName: Mermaid Local Editor
artifactName: ${name}-${version}-${arch}.${ext}
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
mac:
  identity: null
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  category: public.app-category.developer-tools
  icon: build/icon.png
win:
  target:
    - nsis
  icon: build/icon.png
linux:
  target:
    - AppImage
    - deb
    - rpm
    - pacman
  category: Development
  icon: build/icon.png
