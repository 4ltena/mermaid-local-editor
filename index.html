<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mermaid Local Editor</title>
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="toolbar__group toolbar__group--title">
          <span class="brand">Mermaid Local Editor</span>
        </div>
        <div class="toolbar__group">
          <label class="field">
            <span data-i18n="toolbar.sample">Sample</span>
            <select id="sample-select" data-i18n-title="title.sampleSelect" title="Load a sample">
              <option value="" data-i18n="sample.placeholder">— Select —</option>
            </select>
          </label>
          <label class="field">
            <span data-i18n="toolbar.theme">Theme</span>
            <select id="theme-select" data-i18n-title="title.themeSelect" title="Mermaid theme">
              <option value="default">default</option>
              <option value="dark">dark</option>
              <option value="forest">forest</option>
              <option value="neutral">neutral</option>
            </select>
          </label>
        </div>
        <div class="toolbar__group">
          <button id="btn-zoom-out" data-i18n-title="title.zoomOut" title="Zoom out">－</button>
          <button id="btn-zoom-reset" data-i18n-title="title.zoomReset" title="Reset view">100%</button>
          <button id="btn-zoom-in" data-i18n-title="title.zoomIn" title="Zoom in">＋</button>
        </div>
        <div class="toolbar__group toolbar__group--right">
          <button id="btn-export" data-i18n-title="title.export" title="Export the diagram"><span data-i18n="btn.export">Export</span></button>
          <div class="lang-dd">
            <button id="btn-lang" class="lang-trigger" data-i18n-title="title.lang" title="Language" aria-haspopup="listbox" aria-expanded="false">
              <span class="lang-code">EN</span><span class="lang-caret">▾</span>
            </button>
            <ul id="lang-menu" class="lang-menu" role="listbox" hidden></ul>
          </div>
          <button id="btn-theme-ui" data-i18n-title="title.themeUi" title="Toggle light/dark">🌙</button>
        </div>
      </header>

      <main class="split" id="split">
        <section class="pane pane--editor">
          <div id="editor" class="editor"></div>
          <button id="editor-copy" class="editor-copy" type="button" data-i18n-title="title.copy" title="Copy code" aria-label="Copy code">
            <svg class="icon-copy" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            <svg class="icon-check" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M5 13l4 4 10-11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </section>
        <div class="gutter" id="gutter" data-i18n-title="title.gutter" title="Drag to resize"></div>
        <section class="pane pane--preview">
          <div class="preview-viewport" id="preview-viewport">
            <div class="preview-canvas" id="preview-canvas"></div>
          </div>
          <div class="error-panel" id="error-panel" hidden></div>
        </section>
      </main>

      <footer class="statusbar">
        <span id="status-text">Ready</span>
      </footer>
    </div>
    <div id="export-dialog" class="modal" hidden>
      <div class="modal__backdrop" data-close></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="exp-title">
        <h2 id="exp-title" data-i18n="export.title">Export</h2>

        <div class="exp-row">
          <span class="exp-label" data-i18n="export.format">Format</span>
          <label><input type="radio" name="exp-format" id="exp-format-svg" value="svg" checked /> SVG</label>
          <label><input type="radio" name="exp-format" value="png" /> PNG</label>
          <label><input type="radio" name="exp-format" value="webp" /> WebP</label>
        </div>

        <div class="exp-row">
          <span class="exp-label" data-i18n="export.size">Size</span>
          <label><input type="radio" name="exp-size" id="exp-size-auto" value="auto" checked /> <span data-i18n="export.auto">auto</span></label>
          <label><input type="radio" name="exp-size" id="exp-size-custom" value="custom" /> <span data-i18n="export.custom">custom</span></label>
        </div>

        <div class="exp-row" id="exp-scale-row">
          <span class="exp-label" data-i18n="export.scale">Scale</span>
          <label><input type="radio" name="exp-scale" value="1" /> 1×</label>
          <label><input type="radio" name="exp-scale" value="2" checked /> 2×</label>
          <label><input type="radio" name="exp-scale" value="3" /> 3×</label>
          <label><input type="radio" name="exp-scale" value="n" /> <input type="number" id="exp-scale-n" min="1" max="10" step="1" value="2" class="exp-num exp-num--scale" /> ×</label>
        </div>

        <div class="exp-row" id="exp-custom-row">
          <input type="number" id="exp-w" min="1" class="exp-num" /> px
          <span class="exp-x">×</span>
          <input type="number" id="exp-h" min="1" class="exp-num" /> px
          <button id="exp-lock" class="exp-lock is-locked" type="button" data-i18n-title="export.lock" title="Lock aspect ratio" aria-pressed="true">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M9.5 8.5a3.5 3.5 0 0 1 5 0l1 1a3.5 3.5 0 0 1 0 5M14.5 15.5a3.5 3.5 0 0 1-5 0l-1-1a3.5 3.5 0 0 1 0-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>

        <div class="exp-actions">
          <button id="exp-cancel" type="button" data-close data-i18n="export.cancel">Cancel</button>
          <button id="exp-run" type="button" class="exp-run" data-i18n="export.run">Export</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
