<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mermaid Local Editor</title>
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="toolbar__group toolbar__group--title">
          <span class="brand">Mermaid Local Editor</span>
        </div>
        <div class="toolbar__group">
          <label class="field">
            <span>サンプル</span>
            <select id="sample-select" title="サンプルを読み込む">
              <option value="">— 選択 —</option>
            </select>
          </label>
          <label class="field">
            <span>テーマ</span>
            <select id="theme-select" title="Mermaid テーマ">
              <option value="default">default</option>
              <option value="dark">dark</option>
              <option value="forest">forest</option>
              <option value="neutral">neutral</option>
            </select>
          </label>
        </div>
        <div class="toolbar__group">
          <button id="btn-zoom-out" title="縮小">－</button>
          <button id="btn-zoom-reset" title="表示をリセット">100%</button>
          <button id="btn-zoom-in" title="拡大">＋</button>
        </div>
        <div class="toolbar__group toolbar__group--right">
          <button id="btn-copy" title="コードをコピー">コピー</button>
          <button id="btn-export-svg" title="SVG を保存">SVG</button>
          <button id="btn-export-png" title="PNG を保存">PNG</button>
          <button id="btn-theme-ui" title="画面の明暗を切替">🌙</button>
        </div>
      </header>

      <main class="split" id="split">
        <section class="pane pane--editor">
          <div id="editor" class="editor"></div>
        </section>
        <div class="gutter" id="gutter" title="ドラッグで幅を調整"></div>
        <section class="pane pane--preview">
          <div class="preview-viewport" id="preview-viewport">
            <div class="preview-canvas" id="preview-canvas"></div>
          </div>
          <div class="error-panel" id="error-panel" hidden></div>
        </section>
      </main>

      <footer class="statusbar">
        <span id="status-text">準備完了</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
