<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mermaid Local Editor</title>
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="toolbar__group toolbar__group--title">
          <span class="brand">Mermaid Local Editor</span>
        </div>
        <div class="toolbar__group">
          <label class="field">
            <span data-i18n="toolbar.sample">Sample</span>
            <select id="sample-select" data-i18n-title="title.sampleSelect" title="Load a sample">
              <option value="" data-i18n="sample.placeholder">— Select —</option>
            </select>
          </label>
          <label class="field">
            <span data-i18n="toolbar.theme">Theme</span>
            <select id="theme-select" data-i18n-title="title.themeSelect" title="Mermaid theme">
              <option value="default">default</option>
              <option value="dark">dark</option>
              <option value="forest">forest</option>
              <option value="neutral">neutral</option>
            </select>
          </label>
        </div>
        <div class="toolbar__group">
          <button id="btn-zoom-out" data-i18n-title="title.zoomOut" title="Zoom out">－</button>
          <button id="btn-zoom-reset" data-i18n-title="title.zoomReset" title="Reset view">100%</button>
          <button id="btn-zoom-in" data-i18n-title="title.zoomIn" title="Zoom in">＋</button>
        </div>
        <div class="toolbar__group toolbar__group--right">
          <button id="btn-copy" data-i18n-title="title.copy" title="Copy code"><span data-i18n="btn.copy">Copy</span></button>
          <button id="btn-export-svg" data-i18n-title="title.svg" title="Save SVG">SVG</button>
          <button id="btn-export-png" data-i18n-title="title.png" title="Save PNG">PNG</button>
          <button id="btn-lang" class="lang-toggle" data-i18n-title="title.lang" title="Switch language">
            <span class="lang-seg" data-locale="ja">JA</span>
            <span class="lang-sep">|</span>
            <span class="lang-seg" data-locale="en">EN</span>
          </button>
          <button id="btn-theme-ui" data-i18n-title="title.themeUi" title="Toggle light/dark">🌙</button>
        </div>
      </header>

      <main class="split" id="split">
        <section class="pane pane--editor">
          <div id="editor" class="editor"></div>
        </section>
        <div class="gutter" id="gutter" data-i18n-title="title.gutter" title="Drag to resize"></div>
        <section class="pane pane--preview">
          <div class="preview-viewport" id="preview-viewport">
            <div class="preview-canvas" id="preview-canvas"></div>
          </div>
          <div class="error-panel" id="error-panel" hidden></div>
        </section>
      </main>

      <footer class="statusbar">
        <span id="status-text">Ready</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
