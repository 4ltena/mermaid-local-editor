name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.3). Falls back to package.json."
        required: false

# 既定は読み取りのみ。書き込みが要る release ジョブだけに job 単位で付与する。
permissions:
  contents: read

jobs:
  # ---- バージョン解決（各ジョブで共有）----
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - id: ver
        # 信頼できない入力は env 経由で受け、shell へ直接展開しない
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then v="$INPUT_VERSION"
          elif [ "$REF_TYPE" = tag ] && printf '%s' "$REF_NAME" | grep -qE '^v[0-9]'; then v="${REF_NAME#v}"
          else v="$(node -p "require('./package.json').version")"; fi
          # 後続ジョブで式展開されるため、安全な文字種へ正規化する
          v=$(printf '%s' "$v" | tr -cd '0-9A-Za-z.+_-')
          [ -n "$v" ] || v="0.0.0"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Version = $v"

  # ---- 各OSでビルド → artifact 化（ここでは publish しない）----
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            key: mac
            args: ""
            artifacts: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            platform: win
            key: win-x64
            args: "--x64"
            artifacts: |
              release/*-x64.exe
          - os: windows-latest
            platform: win
            key: win-arm64
            args: "--arm64"
            artifacts: |
              release/*-arm64.exe
          - os: ubuntu-latest
            platform: linux
            key: linux
            args: ""
            artifacts: |
              release/*.AppImage
              release/*.deb
              release/*.rpm
              release/*.pacman
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Linux の rpm / pacman ターゲットは外部ツールに依存する。
      # rpm -> rpmbuild、pacman -> bsdtar(libarchive-tools)。ubuntu-latest が
      # 将来 rpm を外しても落ちないよう、両方を明示インストールする。
      - name: Install Linux packaging deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      # タグのバージョンを成果物名へ反映（electron-builder は package.json を参照する）
      - name: Set version
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build renderer/main/preload
        run: npm run build

      - name: Package (${{ matrix.key }})
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.key }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  # ---- 成果物を集約して GitHub Release を作成（tag push 時のみ）----
  release:
    needs: [version, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          # 紹介段落のみ日英併記、以降は英語に統一する。
          generate_release_notes: false
          body: |
            ## Mermaid Local Editor ${{ github.ref_name }}

            完全ローカル・オフラインで動く、クロスプラットフォームの Mermaid ダイアグラムエディタ（Electron）。Windows / macOS / Linux 用のネイティブアプリです。

            A fully local, offline, cross-platform Mermaid diagram editor (Electron). Native apps for Windows / macOS / Linux.

            ### macOS

            | File | Description |
            |---|---|
            | `mermaid-local-editor-*-universal.dmg` | **Recommended.** Universal disk image (Apple Silicon + Intel). Open it and drag to Applications. |
            | `mermaid-local-editor-*-universal.zip` | The same `.app`, zipped. |

            > Unsigned build: on first launch, right-click the `.app` → "Open" to get past Gatekeeper.

            ### Windows

            | File | Description |
            |---|---|
            | `mermaid-local-editor-*-x64.exe` | NSIS installer for Intel/AMD 64-bit (most PCs). |
            | `mermaid-local-editor-*-arm64.exe` | NSIS installer for Windows on ARM. |

            > Unsigned build: if SmartScreen warns, choose "More info" → "Run anyway".

            ### Linux

            Choose the file that matches your distro.

            | File | Target |
            |---|---|
            | `mermaid-local-editor-*.AppImage` | Universal (all distros). Make it executable and run. |
            | `mermaid-local-editor-*.deb` | Ubuntu / Debian family |
            | `mermaid-local-editor-*.rpm` | AlmaLinux / RHEL / Fedora family |
            | `mermaid-local-editor-*.pacman` | Arch family |

            > All run fully offline (no extra network permissions, no outbound data).
