name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.3). Falls back to package.json."
        required: false

# 既定は読み取りのみ。書き込みが要る release ジョブだけに job 単位で付与する。
permissions:
  contents: read

jobs:
  # ---- バージョン解決（各ジョブで共有）----
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - id: ver
        # 信頼できない入力は env 経由で受け、shell へ直接展開しない
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then v="$INPUT_VERSION"
          elif [ "$REF_TYPE" = tag ] && printf '%s' "$REF_NAME" | grep -qE '^v[0-9]'; then v="${REF_NAME#v}"
          else v="$(node -p "require('./package.json').version")"; fi
          # 後続ジョブで式展開されるため、安全な文字種へ正規化する
          v=$(printf '%s' "$v" | tr -cd '0-9A-Za-z.+_-')
          [ -n "$v" ] || v="0.0.0"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Version = $v"

  # ---- 各OSでビルド → artifact 化（ここでは publish しない）----
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            key: mac
            args: ""
            artifacts: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            platform: win
            key: win-x64
            args: "--x64"
            artifacts: |
              release/*-x64.exe
          - os: windows-latest
            platform: win
            key: win-arm64
            args: "--arm64"
            artifacts: |
              release/*-arm64.exe
          - os: ubuntu-latest
            platform: linux
            key: linux
            args: ""
            artifacts: |
              release/*.AppImage
              release/*.deb
              release/*.rpm
              release/*.pacman
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Linux の rpm / pacman ターゲットは外部ツールに依存する。
      # rpm -> rpmbuild、pacman -> bsdtar(libarchive-tools)。ubuntu-latest が
      # 将来 rpm を外しても落ちないよう、両方を明示インストールする。
      - name: Install Linux packaging deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      # タグのバージョンを成果物名へ反映（electron-builder は package.json を参照する）
      - name: Set version
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build renderer/main/preload
        run: npm run build

      - name: Package (${{ matrix.key }})
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.key }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  # ---- 成果物を集約して GitHub Release を作成（tag push 時のみ）----
  release:
    needs: [version, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist

      - name: List
        run: find dist -type f | sort

      # 本文 = CHANGELOG の該当版節（日英併記）+ ダウンロード表。CHANGELOG が唯一のソース。
      - name: Build release notes from CHANGELOG
        env:
          VERSION: ${{ needs.version.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          {
            echo "## Mermaid Local Editor ${REF_NAME}"
            awk -v ver="$VERSION" '
              $0 ~ ("^## \\[" ver "\\]") { grab = 1; next }
              grab && /^## \[/ { exit }
              grab {
                if ($0 ~ /^### (検証|Verified)/) { skip = 1; next }
                if (skip) {
                  if ($0 ~ /^$/ || $0 ~ /^[[:space:]]/ || $0 ~ /^-/) next
                  skip = 0
                }
                print
              }
            ' CHANGELOG.md
            echo
            cat .github/release-assets.md
          } > release-notes.md
          echo "----- release-notes.md -----"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/**/*
          generate_release_notes: false
          body_path: release-notes.md
